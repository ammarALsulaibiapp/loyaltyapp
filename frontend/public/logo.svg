<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Blue gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D4ED8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGradient)"/>
  
  <!-- White wallet base -->
  <rect x="96" y="180" width="320" height="220" rx="24" fill="white" opacity="0.95"/>
  
  <!-- Wallet clasp -->
  <circle cx="400" cy="290" r="28" fill="white"/>
  <circle cx="400" cy="290" r="18" fill="#2563EB"/>
  
  <!-- Golden star in center -->
  <path d="M256 240 L275 285 L323 285 L285 313 L303 358 L256 330 L209 358 L227 313 L189 285 L237 285 Z" fill="#FBBF24"/>
  
  <!-- Loyalty card peeking out (top) -->
  <rect x="130" y="140" width="220" height="80" rx="16" fill="url(#cardGradient)" opacity="0.9"/>
  
  <!-- Card details -->
  <rect x="310" y="160" width="40" height="8" rx="4" fill="white" opacity="0.8"/>
  <rect x="310" y="180" width="30" height="8" rx="4" fill="white" opacity="0.6"/>
  
  <!-- Crown icon on card -->
  <path d="M280 155 L285 170 L295 165 L295 175 L305 170 L310 155 L295 162 L295 155 L285 162 Z" fill="white"/>
</svg>
